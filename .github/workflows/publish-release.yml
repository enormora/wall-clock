---
name: Publish Release

on:
    pull_request:
        types: [closed]

permissions: {}

concurrency:
    group: publish-release-${{ github.event.pull_request.number }}

jobs:
    publish-release:
        if: |
            github.event.pull_request.merged == true &&
            github.event.pull_request.head.ref == 'release/wall-clock' &&
            github.event.pull_request.base.ref == 'main' &&
            github.event.pull_request.title == 'Prepare release'
        runs-on: ubuntu-24.04
        name: Publish release
        permissions:
            contents: write
            id-token: write
            pull-requests: read
        env:
            GH_TOKEN: ${{ github.token }}
            GITHUB_TOKEN: ${{ github.token }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ github.event.pull_request.merge_commit_sha }}
                  fetch-depth: 0
                  persist-credentials: true
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 26.x
            - name: Install dependencies from the lockfile
              run: npm clean-install --ignore-scripts
            - name: Verify registry signatures for installed dependencies
              run: npm audit signatures
            - name: Verify `@packtory/cli` ships with a provenance attestation
              run: |
                  version=$(jq -r '.devDependencies["@packtory/cli"]' package.json)
                  spec="@packtory/cli@${version}"
                  attestation=$(npm view "${spec}" --json | jq -r '.dist.attestations // empty')
                  if [ -z "${attestation}" ]; then
                    echo "::error::${spec} is missing a provenance attestation; refusing to publish"
                    exit 1
                  fi
                  echo "Verified ${spec} has a registered provenance attestation."
            - name: Configure tag-only release push refs
              run: git config remote.origin.push 'refs/tags/*:refs/tags/*'
            - name: Publish release
              id: publish-release
              continue-on-error: true
              run: |
                  set -o pipefail
                  mkdir -p target/release
                  npx just publish-release 2>&1 | tee target/release/publish.log
            # The `sigstore` wrapper used by `libnpmpublish` hardcodes
            # `fetchOnConflict: false`, so a retried Rekor POST after a
            # transient blip surfaces as
            # `error creating tlog entry - (409) an equivalent entry already exists`
            # even though the original submission landed. Re-running publish
            # mints a fresh OIDC cert, so the next signature differs and
            # Rekor accepts it.
            - name: Re-publish release after a transient sigstore failure
              if: steps.publish-release.outcome == 'failure'
              run: |
                  if grep -Eiq 'OIDC token exchange failed with status 404' target/release/publish.log; then
                    echo 'npm Trusted Publishing is not configured correctly for this workflow.'
                    echo 'Expected npm Trusted Publishing workflow filename: publish-release.yml'
                    exit 1
                  fi

                  if grep -Eiq 'attestation|oidc|provenance|rekor|sigstore|tlog' target/release/publish.log; then
                    sleep 30
                    npx just publish-release
                    exit 0
                  fi

                  exit 1
